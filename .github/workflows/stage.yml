name: Stage

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: "tronfees-bot"
  CONTAINER_NAME: "tronfees-bot"
  REGISTRY: "verbitskialex"
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  TRONFEES_SERVICE_API_KEY: ${{ secrets.TRONFEES_SERVICE_API_KEY }}
  TRONFEES_API_BASE_URL: ${{ secrets.TRONFEES_API_BASE_URL }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Docker login
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin

      - name: Build Docker image
        run: |
          docker build . \
            --file Dockerfile \
            --tag $REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            --tag $REGISTRY/$IMAGE_NAME:latest

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      IMAGE_NAME: "tronfees-bot"
      CONTAINER_NAME: "tronfees-bot"
      REGISTRY: "verbitskialex"
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      TRONFEES_SERVICE_API_KEY: ${{ secrets.TRONFEES_SERVICE_API_KEY }}
      TRONFEES_API_BASE_URL: ${{ secrets.TRONFEES_API_BASE_URL }}
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: DOCKER_USER, DOCKER_PASSWORD, CONTAINER_NAME, REGISTRY, IMAGE_NAME, GITHUB_SHA, BOT_TOKEN, TRONFEES_SERVICE_API_KEY, TRONFEES_API_BASE_URL
          script: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin

            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker rmi $REGISTRY/$IMAGE_NAME:$GITHUB_SHA || true
            docker rmi $REGISTRY/$IMAGE_NAME:latest || true

            docker pull $REGISTRY/$IMAGE_NAME:$GITHUB_SHA

            docker run -d \
              --restart always \
              --name $CONTAINER_NAME \
              -e BOT_TOKEN="$BOT_TOKEN" \
              -e TRONFEES_SERVICE_API_KEY="$TRONFEES_SERVICE_API_KEY" \
              -e TRONFEES_API_BASE_URL="$TRONFEES_API_BASE_URL" \
              $REGISTRY/$IMAGE_NAME:$GITHUB_SHA

            sleep 10
            docker ps -a
            docker logs $CONTAINER_NAME --tail 50
